name: "workflow example local"
on:
  push:
    branches:
      - main

jobs:
  greet-user:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Greet user
      uses: ./simple_greet
      with:
        username: "Jean"
        greeting: "Deer"
